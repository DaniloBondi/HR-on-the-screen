name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 1. Dynamically download/regenerate a pristine Gradle Wrapper instance
      - name: Regenerate Clean Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 2. Use the official Gradle Action to handle automatic dependency and build caching
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 3. Build the Android APK (debug)
      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      # 4. Upload the compiled APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/**/*.apk
