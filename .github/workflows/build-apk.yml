name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ '**' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Runner context is available here, so set the SDK root using runner.temp
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Try setup-android action (primary)
        id: setup-android
        uses: android-actions/setup-android@v3
        continue-on-error: true
        with:
          # 'latest' reduces risk of requesting a removed zip name
          cmdline-tools-version: 'latest'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      - name: Manual Android SDK install (fallback)
        if: steps.setup-android.outcome == 'failure'
        run: |
          set -eux

          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          mkdir -p "${ANDROID_SDK_ROOT}/platform-tools"

          # If this  file 404s in the future update it to the latest commandline tools zip from:
          # https://developer.android.com/studio#command-tools
          TOOL_VERSION_ZIP=commandlinetools-linux-9477386_latest.zip
          URL="https://dl.google.com/android/repository/${TOOL_VERSION_ZIP}"
          echo "Downloading $URL"
          curl -fSL "$URL" -o /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d /tmp/cmdline

          # Normalize layout to: $ANDROID_SDK_ROOT/cmdline-tools/latest/...
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          mv /tmp/cmdline/cmdline-tools/* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/"

          # Use the extracted sdkmanager to update/install requested packages
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --update || true
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --licenses

          # Expose tools to later steps
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH

      - name: Ensure SDK tools are on PATH (preinstalled or our SDK)
        run: |
          # If runner has preinstalled SDK layout, add that too
          if [ -d /usr/local/lib/android/sdk/cmdline-tools/latest/bin ]; then
            echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
            echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          fi

          # Add our job-local SDK if present
          if [ -d "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" ]; then
            echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH
            echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH
          fi

      - name: Inspect sdkmanager & installed packages (debug)
        run: |
          which sdkmanager || true
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --list || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/**/*.apk
