name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ '**' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Choose a dedicated SDK root in the runner home to avoid relying on preinstalled
  ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare Android SDK dirs
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          mkdir -p "${ANDROID_SDK_ROOT}/platforms"
          mkdir -p "${ANDROID_SDK_ROOT}/platform-tools"

      - name: Download Android command-line tools (fallback)
        run: |
          # If this file 404s in the future, replace it with the latest file listed on:
          # https://developer.android.com/studio#command-tools
          TOOL_VERSION_ZIP=commandlinetools-linux-9477386_latest.zip
          URL="https://dl.google.com/android/repository/${TOOL_VERSION_ZIP}"
          echo "Downloading $URL"
          curl -fSL "$URL" -o /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d /tmp/cmdline
          # The zip unpacks into a top-level 'cmdline-tools' dir, move it into SDK with layout:
          # $ANDROID_SDK_ROOT/cmdline-tools/latest/...
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          mv /tmp/cmdline/cmdline-tools/* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/"

      - name: Add sdkmanager and platform-tools to PATH
        run: |
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages and accept licenses
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home || '' }}
        run: |
          # Ensure sdkmanager exists
          ls -la "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" || true

          # Update repo indexes (may be required for older toolsets)
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --update || true

          # Install required packages. Quoted as separate arguments.
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          # Accept all licenses non-interactively
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses

      - name: Inspect SDK (debug)
        run: |
          echo "SDK root: ${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}" || true
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --list || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/**/*.apk
