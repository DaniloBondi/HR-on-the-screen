name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode Debug Keystore
        run: |
          # Decode the base64-encoded debug keystore file to the project root
          # so that Gradle can find it for signing config 'debugConfig'.
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully decoded existing debug.keystore"
          else
            echo "debug.keystore.base64 not found. Dynamically generating a standard debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "Successfully generated a standard fallback debug.keystore"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Regenerate Gradle Wrapper
        run: |
          # Regenerate the Gradle Wrapper jar and files to prevent any Git binary corruption issues
          gradle wrapper --gradle-version 9.3.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
